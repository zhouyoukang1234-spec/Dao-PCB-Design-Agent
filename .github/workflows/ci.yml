name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python sources
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.py')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Python files tracked; nothing to compile."
            exit 0
          fi
          echo "Compiling ${#files[@]} Python file(s)..."
          python -m py_compile "${files[@]}"
          echo "py_compile OK"

      - name: Pyflakes (undefined names / unused imports, non-fatal)
        shell: bash
        run: |
          python -m pip install --quiet pyflakes
          # Report issues but do not fail the build (codebase is research-grade).
          python -m pyflakes $(git ls-files '*.py') || true
