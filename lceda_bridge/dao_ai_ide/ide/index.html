<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAO AI IDE</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#0e1116; --bg2:#161b22; --bg3:#1c2230; --line:#2a3140;
    --fg:#e6edf3; --muted:#8b949e; --accent:#4fc3f7; --accent2:#7ee787;
    --danger:#ef5350; --warn:#ffb454; --user:#1f6feb; --tool:#8957e5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg);color:var(--fg);font-size:13px;display:flex;height:100vh;overflow:hidden;
  }
  /* ── 左侧栏 ── */
  #side{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column}
  #brand{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  #brand .logo{font-size:18px}
  #brand .t{font-weight:700;color:var(--accent);font-size:14px}
  #brand .v{font-size:10px;color:var(--muted);margin-left:auto}
  .nav{display:flex;padding:8px;gap:6px;border-bottom:1px solid var(--line)}
  .nav button{flex:1;padding:6px 4px;font-size:12px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer}
  .nav button.active{background:var(--bg3);color:var(--fg);border-color:var(--line)}
  .nav button:hover{color:var(--fg)}
  #sessions{flex:1;overflow-y:auto;padding:8px}
  .sess-hd{display:flex;align-items:center;padding:4px 6px;color:var(--muted);font-size:11px}
  .sess-hd button{margin-left:auto;background:var(--accent);color:#04121c;border:none;border-radius:5px;padding:3px 8px;cursor:pointer;font-weight:700}
  .sess{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;position:relative}
  .sess:hover{background:var(--bg3)}
  .sess.active{background:var(--bg3);border-color:var(--accent)}
  .sess .name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px}
  .sess .meta{font-size:10px;color:var(--muted);margin-top:2px}
  .sess .del{position:absolute;right:6px;top:8px;color:var(--muted);opacity:0;cursor:pointer}
  .sess:hover .del{opacity:1}
  .sess .del:hover{color:var(--danger)}
  #status{padding:8px 12px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);line-height:1.6}
  #status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .dot.on{background:var(--accent2)} .dot.off{background:var(--danger)}
  /* ── 主区 ── */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  .view{flex:1;display:none;flex-direction:column;min-height:0}
  .view.active{display:flex}
  /* chat */
  #chatTop{padding:8px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--bg2)}
  #chatTop .title{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #modelSel{background:var(--bg3);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px;max-width:240px}
  #msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:100%}
  .msg .av{width:26px;height:26px;min-width:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .msg.user .av{background:var(--user)} .msg.assistant .av{background:var(--accent);color:#04121c}
  .msg.tool .av{background:var(--tool)} .msg.system .av{background:#30363d}
  .msg .body{flex:1;min-width:0}
  .msg .who{font-size:11px;color:var(--muted);margin-bottom:3px}
  .msg .content{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;white-space:pre-wrap;word-break:break-word;line-height:1.55}
  .msg.user .content{background:#12233f;border-color:#1f3b63}
  .toolcall{background:var(--bg3);border:1px solid var(--line);border-left:3px solid var(--tool);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:'Cascadia Code',Consolas,monospace;font-size:11px}
  .toolcall .h{color:var(--tool);font-weight:700;margin-bottom:4px}
  .toolcall pre{white-space:pre-wrap;word-break:break-word;color:var(--muted);max-height:180px;overflow:auto}
  .toolcall .res{color:var(--accent2)}
  .toolcall .res.err{color:var(--danger)}
  #composer{border-top:1px solid var(--line);padding:10px 14px;background:var(--bg2)}
  #composer .wrap{display:flex;gap:8px;align-items:flex-end}
  #input{flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;resize:none;max-height:160px;font-family:inherit;line-height:1.5}
  #input:focus{outline:none;border-color:var(--accent)}
  #send{background:var(--accent);color:#04121c;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;white-space:nowrap}
  #send:disabled{opacity:.5;cursor:not-allowed}
  #send.stop{background:var(--danger);color:#fff}
  .hint{font-size:10px;color:var(--muted);margin-top:6px}
  /* settings panes */
  .pane{flex:1;overflow-y:auto;padding:18px 22px}
  .pane h2{font-size:15px;margin-bottom:4px}
  .pane .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}
  .card .row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .card .row:last-child{margin-bottom:0}
  .card label{width:110px;min-width:110px;color:var(--muted);font-size:12px}
  .card input,.card textarea,.card select{flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:12px;font-family:inherit}
  .card textarea{min-height:70px;resize:vertical;line-height:1.5}
  .card input:focus,.card textarea:focus{outline:none;border-color:var(--accent)}
  .list-item{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .list-item.active{border-color:var(--accent)}
  .list-item .info{flex:1;min-width:0}
  .list-item .info .n{font-weight:600}
  .list-item .info .d{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .btn{background:transparent;border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#04121c;border-color:var(--accent);font-weight:700}
  .btn.primary:hover{color:#04121c;opacity:.9}
  .btn.danger{border-color:var(--danger);color:var(--danger)}
  .btn.sm{padding:4px 9px;font-size:11px}
  .pill{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg3);color:var(--muted)}
  .pill.on{background:#14351b;color:var(--accent2)}
  .empty{color:var(--muted);text-align:center;padding:40px 20px;font-size:12px}
  code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-family:'Cascadia Code',Consolas,monospace}
</style>
</head>
<body>
  <!-- 左侧栏 -->
  <div id="side">
    <div id="brand"><span class="logo">☯</span><span class="t">DAO AI IDE</span><span class="v">v1.0</span></div>
    <div class="nav">
      <button data-view="chat" class="active">对话</button>
      <button data-view="models">模型</button>
      <button data-view="prompts">提示词</button>
    </div>
    <div id="sessions">
      <div class="sess-hd"><span>会话</span><button id="newSess">+ 新建</button></div>
      <div id="sessList"></div>
    </div>
    <div id="status">
      <div><span class="dot off" id="edaDot"></span><span id="edaTxt">EDA 引擎: 检测中…</span></div>
      <div><span id="ctxTxt">工程: —</span></div>
      <div><span id="modelTxt">模型: 未配置</span></div>
    </div>
  </div>

  <!-- 主区 -->
  <div id="main">
    <!-- 对话 -->
    <div class="view active" id="view-chat">
      <div id="chatTop">
        <span class="title" id="chatTitle">新会话</span>
        <select id="modelSel"></select>
      </div>
      <div id="msgs"></div>
      <div id="composer">
        <div class="wrap">
          <textarea id="input" rows="1" placeholder="给 AI 下达 PCB 设计指令，或直接对话… (Enter 发送 / Shift+Enter 换行)"></textarea>
          <button id="send">发送</button>
        </div>
        <div class="hint" id="hint">AI 可调用工具直接驱动嘉立创EDA引擎(放置/布线/DRC/导出)。先在「模型」页配置外接 API。</div>
      </div>
    </div>

    <!-- 模型 -->
    <div class="view" id="view-models">
      <div class="pane">
        <h2>外接 API 模型管理</h2>
        <div class="sub">OpenAI 兼容协议 · 多供应商 / Proxy Pro 式路由。密钥仅存本机(localStorage)，经客户端特权通道 <code>sys_ClientUrl</code> 外呼，免 CORS。</div>
        <div class="card">
          <div class="row"><label>名称</label><input id="m_name" placeholder="如 OpenAI / DeepSeek / 本地Proxy"></div>
          <div class="row"><label>Base URL</label><input id="m_base" placeholder="https://api.openai.com/v1"></div>
          <div class="row"><label>API Key</label><input id="m_key" type="password" placeholder="sk-…"></div>
          <div class="row"><label>模型 ID</label><input id="m_model" placeholder="gpt-4o-mini / deepseek-chat …"></div>
          <div class="row"><label>温度</label><input id="m_temp" type="number" step="0.1" min="0" max="2" value="0.3" style="max-width:120px"></div>
          <div class="row" style="justify-content:flex-end;gap:8px">
            <button class="btn" id="m_test">测试连接</button>
            <button class="btn" id="m_clear">清空</button>
            <button class="btn primary" id="m_save">保存供应商</button>
          </div>
        </div>
        <div id="modelList"></div>
      </div>
    </div>

    <!-- 提示词 -->
    <div class="view" id="view-prompts">
      <div class="pane">
        <h2>提示词库</h2>
        <div class="sub">系统提示词 / 预设。选中的提示词作为每个会话的 system 消息注入。</div>
        <div class="card">
          <div class="row"><label>名称</label><input id="p_name" placeholder="如 PCB布局专家 / 简洁助手"></div>
          <div class="row" style="align-items:flex-start"><label>内容</label><textarea id="p_body" placeholder="你是嘉立创EDA里的资深PCB设计AI…"></textarea></div>
          <div class="row" style="justify-content:flex-end;gap:8px">
            <button class="btn" id="p_clear">清空</button>
            <button class="btn primary" id="p_save">保存提示词</button>
          </div>
        </div>
        <div id="promptList"></div>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
